<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oceanex Technology</title>
  <script>
    // Redirect to hash-based routing for GitHub Pages SPA support
    const path = window.location.pathname;
    if (path !== '/' && path !== '/index.html') {
      window.location.replace('/#' + path);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
